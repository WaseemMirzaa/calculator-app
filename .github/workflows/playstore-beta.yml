name: Play Store (beta)

# Builds a signed AAB and uploads it — with the full store listing + screenshots
# — to a Google Play track via Fastlane.
#
# Trigger manually (Actions ▸ "Play Store (beta)" ▸ Run workflow) or by pushing
# a tag like `beta-v1.0.0`. Requires the repository secrets documented in
# PLAYSTORE.md. The app must already exist in the Play Console with one manual
# upload before the API will accept automated uploads.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to release to"
        type: choice
        options: [internal, alpha, beta, production]
        default: beta
      status:
        description: "Release status"
        type: choice
        options: [completed, draft]
        default: completed
  push:
    tags: ['beta-v*', 'play-v*']

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  deploy:
    name: Build & upload to Play
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties

      - name: Build signed App Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Write Play service-account JSON
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_JSON" > android/play-service-account.json

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      - name: Upload to Google Play
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/android/play-service-account.json
        run: |
          bundle exec fastlane beta \
            track:"${{ github.event.inputs.track || 'beta' }}" \
            status:"${{ github.event.inputs.status || 'completed' }}"

      - name: Clean up secrets
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties android/play-service-account.json

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-grain-appbundle
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
