name: Publish APK

# Builds the release APK on a GitHub runner (which has Android SDK + Google
# Maven access) and publishes it as a downloadable asset on a GitHub Release,
# so it can be downloaded directly without a login. Runs on pushes to the
# development branch and can also be triggered manually.
on:
  push:
    branches: [ 'claude/**' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  publish-apk:
    name: Build & publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Stage APK with a stable name
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/golden-grain-calculator.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-grain-calculator-apk
          path: dist/golden-grain-calculator.apk
          if-no-files-found: error

      - name: Publish to GitHub Release (v1.0.0)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Golden Grain Calculator v1.0.0
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Automated release build of the Golden Grain Calculator.

            **Direct APK download:** `golden-grain-calculator.apk` (attached below).

            > Signed with the debug key for testing. Add a release keystore in
            > `android/app/build.gradle.kts` before publishing to the Play Store.
          files: dist/golden-grain-calculator.apk
