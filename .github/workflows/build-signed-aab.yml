name: Build signed AAB

# Produces a release-signed App Bundle (and optional APK) you can download as a
# build artifact — no Google Play account required. Add the four keystore
# secrets (see PLAYSTORE.md), then run this from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: "Also build a signed APK"
        type: boolean
        default: true

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  build:
    name: Build signed bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing (if secrets are set)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
            {
              echo "storeFile=upload-keystore.jks"
              echo "storePassword=$STORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > android/key.properties
            echo "::notice::Release signing configured from secrets."
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building DEBUG-signed (not Play-acceptable)."
          fi

      - name: Build App Bundle (release)
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Build APK (release)
        if: ${{ inputs.build_apk }}
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Clean up signing secrets
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: golden-grain-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload APK
        if: ${{ inputs.build_apk }}
        uses: actions/upload-artifact@v4
        with:
          name: golden-grain-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
