name: golden_grain_calculator
description: "Golden Grain Calculator — inch fraction golden ratio layout tool (free & premium)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # Persists the premium unlock flag across launches.
  shared_preferences: '>=2.0.0 <3.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Loose constraint so the linter resolves across a wide range of Flutter SDKs.
  flutter_lints: '>=2.0.0 <6.0.0'
  # App-icon generation from the brand logo.
  flutter_launcher_icons: ^0.13.1
  # Used by tool/gen_icons.dart to build the icon + adaptive foreground.
  image: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# Run: dart run tool/gen_icons.dart && dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#14261C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#14261C"
    theme_color: "#14261C"
